version: "3.8"

services:
  # ── 数据层 ──
  mysql:
    image: mysql:8.0
    container_name: researchmind-mysql
    restart: unless-stopped
    mem_limit: 512m
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    # 保持原始端口 3306，仅绑定本机避免外网暴露
    ports:
      - "127.0.0.1:3306:3306"
    networks:
      - researchmind
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: researchmind-redis
    restart: unless-stopped
    mem_limit: 64m
    volumes:
      - redis_data:/data
    # 保持原始端口 6379，仅绑定本机
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - researchmind
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ── 应用层 ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: researchmind/backend
    container_name: researchmind-backend
    restart: unless-stopped
    mem_limit: 512m
    env_file:
      - .env
    environment:
      ENV: ${ENV:-production}
      MYSQL_HOST: mysql
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 保持原始端口 8000，仅绑定本机，由宿主机 Nginx 反向代理
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - researchmind
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    command: ["web"]

  # 前端不再通过 Docker 部署，由宿主机 Nginx 直接托管静态文件（与 docmind 保持一致）。
  # 如暂时不需要前端页面，可直接用 nginx.server.conf 中的 /api/ 反向代理提供 API 访问。

  # ── 任务层 ──
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: researchmind/backend
    container_name: researchmind-celery-worker
    restart: unless-stopped
    mem_limit: 256m
    env_file:
      - .env
    environment:
      ENV: ${ENV:-production}
      MYSQL_HOST: mysql
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - researchmind
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://backend:8000/api/health/workers')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    command: ["worker"]

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: researchmind/backend
    container_name: researchmind-celery-beat
    restart: unless-stopped
    mem_limit: 128m
    env_file:
      - .env
    environment:
      ENV: ${ENV:-production}
      MYSQL_HOST: mysql
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - celery_beat_schedule:/var/lib/celery
    networks:
      - researchmind
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    command: ["beat"]

  # ── 可观测层（可选，资源紧张时可注释掉）──
  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: researchmind-prometheus
    restart: unless-stopped
    mem_limit: 256m
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - researchmind
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-30d}"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: researchmind-grafana
    restart: unless-stopped
    mem_limit: 256m
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - researchmind
    depends_on:
      - prometheus
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:
  celery_beat_schedule:

networks:
  researchmind:
    driver: bridge
